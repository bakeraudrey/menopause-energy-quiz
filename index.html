<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5EFE8;--white:#FFFFFF;--card-border:rgba(0,0,0,0.08);--card-shadow:0 2px 20px rgba(0,0,0,0.07);
  --brown-dark:#3C2A1E;--brown-mid:#7A5C48;--brown-light:#A8917E;--brown-faint:#C9B5A6;
  --terracotta:#C4714A;--terracotta-hover:#A85A38;--terracotta-light:#FBF0EB;--terracotta-border:rgba(196,113,74,0.18);
  --teal:#25526B;--teal-dark:#1A3D52;
  --sage-pill-bg:#D8E8E0;--sage-pill-text:#3D6B57;--sage-quote-bg:#EEF4F0;--sage-quote-border:#7DAF94;
  --option-border:#E2D6CC;--option-hover:#FBF7F3;--option-sel-border:#C4714A;--option-sel-bg:#FBF0EB;
  --btn-muted:#BFB0A4;
  --serif:"Libre Baskerville",Georgia,serif;--sans:"DM Sans",system-ui,sans-serif
}
body{font-family:var(--sans);background:var(--bg);color:var(--brown-dark);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:0 1rem 5rem}
.shell{width:100%;max-width:640px}
.logo-bar{text-align:center;padding:1.25rem 0 0.75rem;border-bottom:1px solid var(--card-border);background:var(--bg)}
.logo-bar img{height:44px;width:auto;max-width:220px;object-fit:contain}
.page-header{text-align:center;padding:2.5rem 1.5rem 2rem}
.page-brand{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--brown-light);margin-bottom:1.25rem}
.page-title{font-family:var(--serif);font-size:clamp(1.55rem,4vw,2.1rem);font-weight:400;color:var(--brown-dark);line-height:1.28;margin-bottom:.85rem}
.page-title em{font-style:italic;color:var(--terracotta)}
.page-sub{font-family:var(--sans);font-size:.88rem;font-weight:300;color:var(--brown-mid);line-height:1.65;max-width:440px;margin:0 auto}
.progress-section{padding:0 .25rem 1.25rem}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.progress-lbl{font-size:10px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--brown-faint)}
.progress-num{font-size:11px;font-weight:400;color:var(--teal);font-family:var(--serif);font-style:italic}
.progress-segments{display:flex;gap:5px}
.seg{flex:1;height:3px;border-radius:99px;background:#DDD4CB;transition:background .35s ease}
.seg.active{background:var(--teal)}
.q-card{background:var(--white);border-radius:18px;box-shadow:var(--card-shadow);border:1px solid var(--card-border);padding:2rem 1.75rem 1.75rem}
.q-pill{display:inline-block;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--sage-pill-text);background:var(--sage-pill-bg);border-radius:99px;padding:.28rem .8rem;margin-bottom:1.1rem}
.q-text{font-family:var(--serif);font-size:clamp(1.1rem,2.8vw,1.35rem);font-weight:400;color:var(--brown-dark);line-height:1.45;margin-bottom:1.75rem}
.options{display:flex;flex-direction:column;gap:.55rem}
.opt{display:flex;align-items:center;gap:.9rem;padding:.9rem 1.1rem;background:var(--white);border:1.5px solid var(--option-border);border-radius:12px;cursor:pointer;font-family:var(--sans);font-size:.88rem;font-weight:300;color:var(--brown-dark);line-height:1.5;transition:all .2s ease;text-align:left;width:100%}
.opt:hover{border-color:var(--brown-faint);background:var(--option-hover)}
.opt.sel{border-color:var(--option-sel-border);background:var(--option-sel-bg)}
.opt.sel .radio{border-color:var(--terracotta)}
.opt.sel .radio::after{opacity:1}
.radio{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--option-border);background:var(--white);display:flex;align-items:center;justify-content:center;transition:border-color .2s;position:relative}
.radio::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--terracotta);opacity:0;transition:opacity .2s}
.card-btn{margin-top:1.5rem;width:100%;padding:.9rem 1rem;background:var(--btn-muted);color:var(--white);border:none;border-radius:12px;font-family:var(--sans);font-size:.88rem;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;justify-content:center;gap:.4rem}
.card-btn.ready{background:var(--teal)}
.card-btn.ready:hover{background:var(--teal-dark);transform:translateY(-1px)}
.back-row{text-align:left;padding:.85rem 0 0}
.back-btn{font-family:var(--sans);font-size:.82rem;color:var(--brown-faint);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:.3rem;transition:color .2s}
.back-btn:hover{color:var(--brown-mid)}
.back-btn:disabled{opacity:.3;cursor:default}
.intro-serif{font-family:var(--serif);font-style:italic;font-size:1.05rem;font-weight:400;color:var(--brown-mid);margin-bottom:1rem;text-align:center}
.intro-body{font-size:.88rem;font-weight:300;color:var(--brown-mid);line-height:1.8;margin-bottom:1.5rem;text-align:center}
.chips{display:flex;align-items:center;justify-content:center;gap:1.25rem;flex-wrap:wrap;margin-bottom:1.75rem}
.chip{display:flex;align-items:center;gap:.35rem;font-size:.78rem;color:var(--brown-light);font-weight:300}
.chip-dot{width:4px;height:4px;border-radius:50%;background:var(--terracotta)}
.intro-btn{display:block;margin:0 auto;width:100%;padding:.9rem 1rem;background:var(--teal);color:var(--white);border:none;border-radius:12px;font-family:var(--sans);font-size:.88rem;font-weight:500;letter-spacing:.04em;cursor:pointer;transition:all .25s ease}
.intro-btn:hover{background:var(--teal-dark);transform:translateY(-1px)}
.result-header{text-align:center;padding:2.5rem 1.5rem 2rem}
.result-title{font-family:var(--serif);font-size:clamp(1.55rem,4vw,2rem);font-weight:400;color:var(--brown-dark);line-height:1.3;margin-bottom:.5rem}
.result-sub{font-family:var(--serif);font-style:italic;font-size:.98rem;color:var(--brown-light)}
.result-card{background:var(--white);border-radius:18px;box-shadow:var(--card-shadow);border:1px solid var(--card-border);overflow:hidden}
.result-pill-row{padding:1.5rem 1.75rem 0}
.result-pill{display:inline-block;font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--sage-pill-text);background:var(--sage-pill-bg);border-radius:99px;padding:.28rem .8rem}
.result-card-title{font-family:var(--serif);font-size:clamp(1.25rem,3vw,1.6rem);font-weight:400;color:var(--brown-dark);line-height:1.3;padding:.85rem 1.75rem .35rem}
.result-card-sub{font-family:var(--serif);font-style:italic;font-size:.9rem;color:var(--brown-light);padding:0 1.75rem 1.25rem;border-bottom:1px solid #F0E8E0}
.result-body-text{padding:1.5rem 1.75rem}
.result-body-text p{font-size:.9rem;font-weight:300;color:var(--brown-dark);line-height:1.85;margin-bottom:1rem}
.result-body-text p:last-child{margin-bottom:0}
.quote-block{margin:0 1.75rem 1.5rem;padding:1.25rem 1.4rem;background:var(--sage-quote-bg);border-left:3px solid var(--sage-quote-border);border-radius:0 10px 10px 0}
.quote-text{font-family:var(--serif);font-style:italic;font-size:.88rem;color:var(--brown-dark);line-height:1.8;margin-bottom:.5rem}
.quote-name{font-size:.75rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--brown-light)}
.next-step{margin:0 1.75rem 1.75rem;padding:1.25rem 1.4rem;background:var(--terracotta-light);border:1px solid var(--terracotta-border);border-radius:12px}
.next-step-lbl{font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--terracotta);margin-bottom:.5rem}
.next-step-text{font-size:.88rem;font-weight:400;color:var(--brown-dark);line-height:1.7}
.cta-section{background:#F0EAE2;border-top:1px solid #EDE2D8;padding:1.75rem;text-align:center}
.cta-diamond{color:var(--sage-quote-border);font-size:.9rem;margin-bottom:.85rem;display:block}
.cta-head{font-family:var(--serif);font-size:1.15rem;font-weight:400;color:var(--brown-dark);line-height:1.4;margin-bottom:.7rem}
.cta-body-text{font-size:.85rem;font-weight:300;color:var(--brown-mid);line-height:1.7;margin-bottom:1.25rem}
.cta-link{display:block;width:100%;padding:.95rem 1rem;background:var(--brown-dark);color:var(--white);border-radius:12px;font-family:var(--sans);font-size:.85rem;font-weight:500;text-decoration:none;text-align:center;transition:all .25s ease;margin-bottom:.65rem}
.cta-link:hover{background:var(--teal);transform:translateY(-1px)}
.cta-footnote{font-size:.75rem;font-weight:300;color:var(--brown-light)}
.retake-row{text-align:center;padding:1.25rem 0 .5rem}
.retake-btn{background:none;border:none;font-family:var(--sans);font-size:.82rem;font-weight:300;color:var(--brown-light);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.retake-btn:hover{color:var(--brown-mid)}
.fade-in{animation:fi .38s ease}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.slide-r{animation:sr .32s ease}
@keyframes sr{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.slide-l{animation:sl .32s ease}
@keyframes sl{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@media(max-width:500px){
  body{padding:0 .5rem 4rem}
  .page-header,.result-header{padding-left:1rem;padding-right:1rem}
  .q-card{padding:1.5rem 1.25rem;border-radius:14px}
  .result-pill-row{padding-left:1.25rem}
  .result-card-title,.result-card-sub{padding-left:1.25rem;padding-right:1.25rem}
  .result-body-text{padding:1.25rem}
  .quote-block,.next-step{margin-left:1.25rem;margin-right:1.25rem}
  .cta-section{padding:1.25rem}
}
</style>
</head>

function pick(i){
  ans[q]=i;
  document.querySelectorAll(".opt").forEach((b,j)=>b.classList.toggle("sel",j===i));
  const n=document.getElementById("nx");if(n)n.classList.add("ready");
  setTimeout(goNext,320);
}
function goNext(){
  if(ans[q]===undefined)return;
  dir=1;
  if(q<Qs.length-1){q++;renderQ();}else{showResult();}
}
function goBack(){
  if(q===0){renderIntro();return;}
  dir=-1;q--;renderQ();
}
function getType(){
  const c={1:0,2:0,3:0};
  Qs.forEach((_,i)=>{if(ans[i]!==undefined)c[Qs[i].opts[ans[i]].v]++;});
  let mx=0,w=1;
  for(const[t,n]of Object.entries(c)){if(n>mx){mx=n;w=+t;}}
  return w;
}
